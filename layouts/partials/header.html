<header class="gh-header">
  <nav class="gh-nav gh-outer">
    <div class="gh-nav-inner gh-inner">
      <div class="gh-nav-brand">
        <a class="gh-nav-logo" href="{{ .Site.BaseURL }}">
          {{ .Site.Title }}
        </a>
      </div>

      <div class="gh-nav-menu">
        {{ range .Site.Menus.main }}
        <a class="gh-nav-link{{ if $.IsMenuCurrent "main" . }} gh-nav-link-active{{ end }}" href="{{ .URL }}">
          {{ .Name }}
        </a>
        {{ end }}

        <button class="gh-darkmode-toggle" id="darkmode-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="gh-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="gh-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>

      <button class="gh-burger" id="gh-burger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
</header>
